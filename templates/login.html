<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAIER - ESD MONITORING SYSTEM</title>
<style>
  :root {
    --bg-base: #060913;
    --bg-surface: #0f1624;
    --border-color: rgba(255, 255, 255, 0.08);
    --primary: #0072CE;
    --primary-hover: #1e88e5;
    --text-main: #f5f6f9;
    --text-muted: #748297;
    --status-violation: #ff1744;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background: radial-gradient(circle at 50% 50%, #0c1b30 0%, #060913 100%);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Decorative Background Glows */
  body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0, 114, 206, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
    top: -200px;
    left: -200px;
    z-index: 0;
  }
  
  body::after {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0, 114, 206, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
    bottom: -250px;
    right: -200px;
    z-index: 0;
  }

  .login-container {
    position: relative;
    z-index: 10;
  }

  .login-card {
    background: rgba(15, 22, 36, 0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    width: 400px;
    padding: 40px 32px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .login-card:hover {
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7), 
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }

  .brand-hdr {
    text-align: center;
    margin-bottom: 32px;
  }
  
  .brand-hdr h1 {
    font-size: 2.5rem;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.04em;
    display: inline-block;
    position: relative;
  }

  .brand-hdr h1::after {
    content: "";
    display: block;
    width: 40px;
    height: 3px;
    background-color: var(--primary);
    margin: 8px auto 0 auto;
    border-radius: 2px;
  }

  .brand-hdr p {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-top: 10px;
    font-weight: 700;
  }
  
  .form-group {
    margin-bottom: 22px;
    position: relative;
  }
  
  .form-group label {
    display: block;
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .form-group input {
    width: 100%;
    background-color: rgba(0, 0, 0, 0.35);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text-main);
    font-size: 0.95rem;
    transition: all 0.25s ease;
  }
  
  .form-group input:focus {
    border-color: var(--primary);
    background-color: rgba(0, 0, 0, 0.5);
    box-shadow: 0 0 10px rgba(0, 114, 206, 0.25);
    outline: none;
  }
  
  .btn-submit {
    width: 100%;
    background-color: var(--primary);
    color: #ffffff;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: all 0.25s ease;
    margin-top: 10px;
    box-shadow: 0 4px 12px rgba(0, 114, 206, 0.2);
  }
  
  .btn-submit:hover {
    background-color: var(--primary-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0, 114, 206, 0.35);
  }

  .btn-submit:active {
    transform: translateY(1px);
  }
  
  .err-msg {
    color: var(--status-violation);
    background-color: rgba(255, 23, 68, 0.08);
    border: 1px solid rgba(255, 23, 68, 0.2);
    border-radius: 8px;
    padding: 10px;
    font-size: 0.8rem;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="brand-hdr">
      <h1>Haier</h1>
      <p>ESD System Authentication</p>
    </div>
    
    {% if error %}
      <div class="err-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form action="{{ url_for('login') }}" method="POST">
      <div class="form-group">
        <label>User ID / Employee Code</label>
        <input type="text" name="username" required placeholder="Enter Username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Passkey Profile</label>
        <input type="password" name="password" required placeholder="Enter Passkey" autocomplete="current-password">
      </div>
      <button class="btn-submit" type="submit">Verify Credentials</button>
    </form>
  </div>
</div>
</body>
</html>
