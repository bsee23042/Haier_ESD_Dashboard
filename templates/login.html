<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAIER - ESD MONITORING SYSTEM</title>
<style>
  :root {
    --bg-base: #060913;
    --bg-surface: #0f1624;
    --border-color: rgba(255, 255, 255, 0.05);
    --primary: #0072CE;
    --primary-hover: #1e88e5;
    --text-main: #f5f6f9;
    --text-muted: #748297;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg-base);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background-color: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    width: 380px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }
  .brand-hdr {
    text-align: center;
    margin-bottom: 24px;
  }
  .brand-hdr h1 {
    font-size: 2rem;
    font-weight: 800;
    color: var(--primary);
  }
  .brand-hdr p {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .form-group input {
    width: 100%;
    background-color: rgba(0,0,0,0.2);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text-main);
    font-size: 0.9rem;
  }
  .form-group input:focus {
    border-color: var(--primary);
    outline: none;
  }
  .btn-submit {
    width: 100%;
    background-color: var(--primary);
    color: #ffffff;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    transition: background-color 0.2s;
    margin-top: 8px;
  }
  .btn-submit:hover {
    background-color: var(--primary-hover);
  }
  .err-msg {
    color: #ff1744;
    font-size: 0.8rem;
    margin-bottom: 12px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand-hdr">
    <h1>Haier</h1>
    <p>ESD System Authentication</p>
  </div>
  
  {% if error %}
    <div class="err-msg">{{ error }}</div>
  {% endif %}

  <form action="{{ url_for('login') }}" method="POST">
    <div class="form-group">
      <label>User ID / Employee Code</label>
      <input type="text" name="username" required placeholder="admin">
    </div>
    <div class="form-group">
      <label>Passkey Profile</label>
      <input type="password" name="password" required placeholder="admin123">
    </div>
    <button class="btn-submit" type="submit">Verify Credentials</button>
  </form>
</div>
</body>
</html>
